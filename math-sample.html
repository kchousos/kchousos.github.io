<h2 id="org47aede7"><i>Euler's Number</i></h2>
<div class="outline-text-2" id="text-org47aede7">
<p>
\[e = \sum_{n=0}{\infty} \frac{1}{n!}\]
</p>
</div>
</div>

<div id="outline-container-orga72f683" class="outline-2">
<h2 id="orga72f683"><i>Euler's Formula</i></h2>
<div class="outline-text-2" id="text-orga72f683">
<p>
\[e^{\imath x} = \cos x + \imath \sin x\]
</p>
